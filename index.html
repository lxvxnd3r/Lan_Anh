<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:Arial,sans-serif;
    color:white;

    background:black;
}

/* VIDEO */

#bg-video{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    /* Hiện phần trên của cây */
    object-position:center top;

    z-index:0;
}

/* LỚP TỐI */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.05);

    z-index:1;
}

/* KHUNG KÍNH */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:700px;
    max-width:90%;

    padding:55px;

    text-align:center;

    background:
        linear-gradient(
            rgba(255,255,255,0.02),
            rgba(255,255,255,0.02)
        ) padding-box,

        linear-gradient(
            135deg,
            rgba(255,190,230,0.75),
            rgba(190,240,255,0.75)
        ) border-box;

    backdrop-filter:
        blur(4px)
        saturate(180%)
        brightness(1.1);

    -webkit-backdrop-filter:
        blur(4px)
        saturate(180%)
        brightness(1.1);

    border:1.5px solid transparent;

    border-radius:40px;

    box-shadow:

        inset 0 1px 1px rgba(255,255,255,0.20),

        0 0 25px rgba(255,190,230,0.18),

        0 0 45px rgba(190,240,255,0.18),

        0 15px 40px rgba(0,0,0,0.18);

    overflow:visible;

    z-index:2;

    transition:0.5s;
}

/* PHẢN CHIẾU KÍNH */

.container::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:40px;

    background:

        linear-gradient(
            to bottom,
            rgba(255,255,255,0.22),
            transparent 35%
        ),

        radial-gradient(
            circle at top left,
            rgba(255,220,240,0.25),
            transparent 55%
        ),

        radial-gradient(
            circle at top right,
            rgba(210,245,255,0.25),
            transparent 55%
        );

    pointer-events:none;
}

/* VỆT SÁNG */

.container::after{

    content:"";

    position:absolute;

    top:-40%;
    left:-25%;

    width:60%;
    height:220%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.15),
            transparent
        );

    transform:rotate(25deg);

    pointer-events:none;
}

/* HOVER */

.container:hover{

    transform:
        translate(-50%,-52%);

    box-shadow:

        0 0 35px rgba(255,190,230,0.28),

        0 0 60px rgba(190,240,255,0.28),

        0 20px 55px rgba(0,0,0,0.22);
}

/* CHỮ */

.container h1,
.container h2,
.container p{

    position:relative;

    z-index:5;
}

.container h1{

    font-size:72px;

    margin-bottom:20px;

    text-shadow:
        0 0 15px rgba(255,255,255,0.25);
}

.container h2{

    font-size:28px;

    font-weight:normal;

    margin-bottom:25px;
}

.container p{

    font-size:20px;

    margin-top:12px;
}

/* BONG BÓNG */

.bubble{

    position:absolute;

    border-radius:50%;

    background:
        radial-gradient(
            circle at 30% 30%,
            rgba(255,255,255,0.40),
            rgba(255,255,255,0.05)
        );

    backdrop-filter:blur(10px);

    -webkit-backdrop-filter:blur(10px);

    border:
        1px solid rgba(255,255,255,0.20);

    pointer-events:none;

    z-index:1;
}

.b1{

    width:130px;
    height:130px;

    top:-50px;
    left:-45px;

    animation:
        float1 10s ease-in-out infinite;
}

.b2{

    width:90px;
    height:90px;

    top:70px;
    right:-25px;

    animation:
        float2 8s ease-in-out infinite;
}

.b3{

    width:150px;
    height:150px;

    bottom:-80px;
    left:140px;

    animation:
        float1 12s ease-in-out infinite;
}

.b4{

    width:70px;
    height:70px;

    right:160px;
    bottom:-20px;

    animation:
        float2 9s ease-in-out infinite;
}

.b5{

    width:55px;
    height:55px;

    top:20px;
    left:240px;

    animation:
        float1 7s ease-in-out infinite;
}

/* ANIMATION */

@keyframes float1{

    0%,100%{
        transform:
            translateY(0px);
    }

    50%{
        transform:
            translateY(-14px);
    }
}

@keyframes float2{

    0%,100%{
        transform:
            translateY(0px);
    }

    50%{
        transform:
            translateY(14px);
    }
}
/* WELCOME */

#welcome{

    position:fixed;

    inset:0;

    background:black;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    cursor:pointer;

    z-index:9999;

    transition:1s;
}

#welcome h1{

    font-size:85px;

    margin-bottom:20px;
}

#welcome p{

    font-size:22px;

    opacity:0.8;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

    <source
        src="tree1.mp4"
        type="video/mp4">

</video>

<div class="overlay"></div>

<!-- KHUNG THÔNG TIN -->

<div class="container">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>

    <h1>🌙 Lan Anh</h1>

    <h2>
        "Somewhere between rain and dreams."
    </h2>

    <p>
        ✨ Aesthetic • Anime • Night lover ✨
    </p>

    <p>
        Website cá nhân đầu tiên của mình.
    </p>

</div>

<!-- WELCOME -->

<div id="welcome">

    <h1>🌙</h1>

    <p>Click anywhere to enter</p>

</div>

<!-- NHẠC -->

<audio
id="music"
loop
preload="auto">

    <source
        src="spider%20thread%20monopoly.mp3"
        type="audio/mpeg">

</audio>

<script>

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

welcome.addEventListener("click", async ()=>{

    try{

        music.volume = 0.5;

        await music.play();

    }
    catch(e){

        console.log(e);

    }

    welcome.style.opacity = "0";

    setTimeout(()=>{

        welcome.style.display = "none";

    },1000);

});

</script>

</body>
</html>
