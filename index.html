<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
    background:black;
}

/* VIDEO NỀN */

#bg-video{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    /* Ưu tiên hiện phần trên của cây */
    object-position:center top;

    z-index:0;

    background:black;
}

/* LỚP TỐI */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.35);

    z-index:1;
}

/* KHUNG THÔNG TIN */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:700px;
    max-width:90%;

    padding:55px;

    text-align:center;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.10);

    border-radius:35px;

    box-shadow:
        0 0 30px rgba(130,170,255,0.10);

    z-index:2;

    transition:0.5s;
}

.container:hover{
    transform:
        translate(-50%,-52%);
}

.container h1{

    font-size:72px;

    margin-bottom:20px;

    text-shadow:
        0 0 20px rgba(255,255,255,0.35);
}

.container h2{

    font-size:28px;

    font-weight:normal;

    margin-bottom:25px;
}

.container p{

    font-size:20px;

    margin-top:12px;
}

/* WELCOME */

#welcome{

    position:fixed;
    inset:0;

    background:black;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    z-index:9999;

    cursor:pointer;

    transition:1s;
}

#welcome h1{

    font-size:85px;

    margin-bottom:20px;
}

#welcome p{

    font-size:22px;

    opacity:0.75;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="tree1.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<!-- THÔNG TIN -->

<div class="container">

<h1>🌙 Lan Anh</h1>

<h2>
"Somewhere between rain and dreams."
</h2>

<p>
✨ Aesthetic • Anime • Night lover ✨
</p>

<p>
Website cá nhân đầu tiên của mình.
</p>

</div>

<!-- WELCOME -->

<div id="welcome">

<h1>🌙</h1>

<p>Click anywhere to enter</p>

</div>

<!-- NHẠC -->

<audio
id="music"
loop
preload="auto">

<source
src="spider%20thread%20monopoly.mp3"
type="audio/mpeg">

</audio>

<script>

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

welcome.addEventListener("click", async ()=>{

    try{

        music.volume = 0.5;

        await music.play();

    }
    catch(e){
        console.log(e);
    }

    welcome.style.opacity="0";

    setTimeout(()=>{

        welcome.style.display="none";

    },1000);

});

</script>

</body>
</html>
