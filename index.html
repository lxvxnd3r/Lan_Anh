<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:Arial,sans-serif;

    background:black;

    color:white;
}

/* ===================== */
/* VIDEO */
/* ===================== */

#bg-video{

    position:fixed;

    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    object-position:center top;

    z-index:0;
}

/* ===================== */
/* OVERLAY */
/* ===================== */

.overlay{

    position:fixed;

    inset:0;

    background:

        rgba(0,0,0,.18);

    z-index:1;
}

/* ===================== */
/* CONTAINER */
/* ===================== */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:900px;
    height:700px;

    max-width:95vw;
    max-height:95vh;

    display:flex;

    justify-content:center;
    align-items:center;

    overflow:visible;

    z-index:2;
}

/* ========================= */

.moon-system{

    position:relative;

    width:700px;
    height:700px;

    display:flex;

    justify-content:center;
    align-items:center;
}

/* ========================= */
/* MẶT TRĂNG */
/* ========================= */

#moon{

    position:absolute;

    width:240px;
    height:240px;

    cursor:pointer;

    z-index:20;

    border-radius:50%;

    background:

        radial-gradient(
            circle at 30% 30%,
            rgba(255,255,255,.9),
            rgba(255,255,255,.2) 30%,
            transparent 60%
        ),

        linear-gradient(
            135deg,
            #ffd6f6,
            #d7e2ff,
            #bdf7ff
        );

    /* thay clip-path lỗi */

    clip-path:
    polygon(
        60% 0%,
        75% 8%,
        86% 22%,
        92% 40%,
        90% 58%,
        82% 74%,
        68% 88%,
        50% 95%,
        35% 92%,
        48% 80%,
        55% 65%,
        56% 50%,
        52% 35%,
        45% 20%,
        35% 8%
    );

    box-shadow:

        0 0 45px rgba(255,190,255,.55),

        0 0 100px rgba(170,255,255,.35),

        inset
        0 0 35px rgba(255,255,255,.45);

    animation:
        moonFloat
        5s
        ease-in-out
        infinite;

    transition:

        scale 1s,
        filter 1s,
        box-shadow 1s;
}

#moon:hover{

    scale:1.08;

    box-shadow:

        0 0 70px rgba(255,210,255,.75),

        0 0 150px rgba(170,255,255,.55);
}

/* ========================= */
/* CHỮ */
/* ========================= */

.search-text{

    position:absolute;

    bottom:40px;

    font-size:55px;

    font-weight:600;

    color:white;

    text-shadow:

        0 0 15px #ffd4ff,

        0 0 35px #8be8ff,

        0 0 70px #8be8ff;

    z-index:25;
}

/* ========================= */
/* QUỸ ĐẠO */
/* ========================= */

.orbit-container{

    position:absolute;

    width:700px;
    height:700px;

    display:flex;

    justify-content:center;
    align-items:center;

    opacity:0;

    transform:scale(.3);

    transition:

        opacity 1.5s,
        transform 1.5s;

    pointer-events:auto;
}

.orbit-container.active{

    opacity:1;

    transform:scale(1);

    animation:

        rotateOrbit
        35s
        linear
        infinite;
}

.orbit-container:hover{

    animation-play-state:paused;
}

/* ========================= */
/* VÒNG SÁNG */
/* ========================= */

.orbit-ring{

    position:absolute;

    width:600px;
    height:600px;

    border-radius:50%;

    border:

        2px solid
        rgba(255,255,255,.25);

    box-shadow:

        0 0 25px #ffd4ff,

        0 0 55px #8be8ff,

        0 0 130px rgba(255,255,255,.25);

    animation:

        ringGlow
        5s
        ease-in-out
        infinite;
}

/* ========================= */
/* SAO */
/* ========================= */

.star{

    position:absolute;

    width:18px;
    height:18px;

    background:white;

    transform:rotate(45deg);

    border-radius:3px;

    box-shadow:

        0 0 10px white,

        0 0 30px #ffd6ff,

        0 0 55px #8be8ff;

    animation:
        twinkle 3s infinite;
}

.s1{top:190px;left:250px;}
.s2{top:180px;right:250px;}
.s3{top:300px;left:180px;}
.s4{top:300px;right:180px;}
.s5{bottom:250px;left:250px;}
.s6{bottom:250px;right:250px;}
.s7{top:230px;left:340px;}
.s8{top:230px;right:340px;}

/* ========================= */
/* HÌNH CẦU */
/* ========================= */

.planet{

    position:absolute;

    width:170px;
    height:170px;

    border-radius:50%;

    background:

        radial-gradient(
            circle at 35% 25%,
            rgba(255,255,255,.8),
            rgba(255,255,255,.15) 35%,
            rgba(255,255,255,.05)
        ),

        linear-gradient(
            135deg,
            rgba(255,210,255,.35),
            rgba(190,255,255,.25)
        );

    backdrop-filter:

        blur(25px)
        saturate(180%);

    border:

        2px solid
        rgba(255,255,255,.35);

    box-shadow:

        inset
        0 0 25px rgba(255,255,255,.45),

        0 0 35px rgba(255,210,255,.4),

        0 0 80px rgba(150,255,255,.3);
}

/* ========================= */
/* VỊ TRÍ */
/* ========================= */

.p1{

    top:-85px;
    left:265px;
}

.p2{

    top:265px;
    right:-85px;
}

.p3{

    bottom:-85px;
    left:265px;
}

.p4{

    top:265px;
    left:-85px;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes moonFloat{

    0%,100%{

        translate:0 0;
    }

    50%{

        translate:0 -15px;
    }
}

@keyframes rotateOrbit{

    from{

        transform:
            scale(1)
            rotate(0deg);
    }

    to{

        transform:
            scale(1)
            rotate(360deg);
    }
}

@keyframes twinkle{

    0%,100%{

        opacity:.4;

        transform:

            scale(.8)
            rotate(45deg);
    }

    50%{

        opacity:1;

        transform:

            scale(1.4)
            rotate(45deg);
    }
}

@keyframes ringGlow{

    0%,100%{

        opacity:.7;
    }

    50%{

        opacity:1;

        box-shadow:

            0 0 35px #ffd4ff,

            0 0 80px #8be8ff,

            0 0 150px rgba(255,255,255,.35);
    }
}

</style>
</head>

<body>

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="tree1.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="container">

    <div class="moon-system">

        <div class="orbit-container">

            <div class="orbit-ring"></div>

            <div class="planet p1"></div>
            <div class="planet p2"></div>
            <div class="planet p3"></div>
            <div class="planet p4"></div>

        </div>

        <div id="moon"></div>

        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>

        <p class="search-text">

            Đang tìm kiếm thứ gì à?

        </p>

    </div>

</div>

<div id="welcome">

    <h1>🌙</h1>

    <p>Click anywhere to enter</p>

</div>

<audio
id="music"
loop>

<source
src="spider%20thread%20monopoly.mp3"
type="audio/mpeg">

</audio>

<script>

const moon =
document.getElementById("moon");

const orbit =
document.querySelector(".orbit-container");

moon.onclick = ()=>{

    orbit.classList.toggle("active");

};

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

welcome.onclick = async ()=>{

    try{

        music.volume = .5;

        await music.play();

    }catch(e){}

    welcome.style.opacity="0";

    setTimeout(()=>{

        welcome.style.display="none";

    },1000);

};

</script>

</body>
</html>
