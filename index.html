<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lxvxnd3r🌙</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    background: black;
}

/* VIDEO NỀN */

#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* Ưu tiên hiện phần trên của cây */
    object-position: center top;
    z-index: 0;
    background: black;
}

/* LỚP TỐI */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.25); /* Tăng độ tối nhẹ để khung kính nổi bật hơn */
    z-index: 1;
}

/* KHUNG THÔNG TIN */

.container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    max-width: 90%;
    padding: 60px 50px; /* Tăng padding để bố cục thông thoáng hơn */
    text-align: center;
    /* Liquid Glass */
    background: rgba(255, 255, 255, 0.02); /* Giảm độ mờ của nền kính */
    backdrop-filter: blur(18px) saturate(180%) brightness(1.1); /* Giảm độ blur một chút */
    -webkit-backdrop-filter: blur(18px) saturate(180%) brightness(1.1);
    border: 1px solid rgba(255, 255, 255, 0.15); /* Làm mờ viền kính */
    border-radius: 35px;
    box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.25), /* Giảm độ sáng viền trong */
        inset 0 -8px 20px rgba(255, 255, 255, 0.02),
        0 20px 60px rgba(0, 0, 0, 0.40); /* Tăng độ đậm của shadow ngoài */
    overflow: hidden;
    z-index: 2;
    transition: all 0.5s ease;
}

/* Hiệu ứng phản chiếu kính */

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.15), /* Giảm độ sáng gradient trên */
            rgba(255, 255, 255, 0) 50%
        ),
        radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.20), /* Giảm độ sáng gradient trái */
            transparent 60%
        );
    pointer-events: none;
    opacity: 0.8; /* Giảm độ mờ tổng thể của phản chiếu */
}

/* Hover */

.container:hover {
    transform: translate(-50%, -53%); /* Di chuyển lên trên một chút khi hover */
    box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.35),
        inset 0 -10px 30px rgba(255, 255, 255, 0.04),
        0 30px 80px rgba(0, 0, 0, 0.50); /* Tăng độ đậm shadow khi hover */
}

/* Chữ nằm trên lớp kính */

.container h1,
.container h2,
.container p {
    position: relative;
    z-index: 3;
}

.container h1 {
    font-size: 64px; /* Giảm kích thước chữ tiêu đề một chút */
    margin-bottom: 30px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.15); /* Giảm độ mờ của shadow chữ */
    font-weight: bold; /* Tăng độ đậm cho tiêu đề */
}

.container h2 {
    font-size: 26px; /* Giảm kích thước chữ slogan một chút */
    font-weight: normal;
    margin-bottom: 35px;
    line-height: 1.4; /* Tăng khoảng cách dòng */
}

.container p {
    font-size: 18px; /* Giảm kích thước chữ nội dung một chút */
    margin-top: 15px;
    line-height: 1.6; /* Tăng khoảng cách dòng */
    opacity: 0.9; /* Giảm độ mờ nhẹ cho chữ nội dung */
}

/* MÀN HÌNH CHÀO */

#welcome {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
    transition: 1s ease;
}

#welcome h1 {
    font-size: 80px;
    margin-bottom: 20px;
}

#welcome p {
    font-size: 18px;
    letter-spacing: 2px;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="tree1.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<!-- THÔNG TIN -->

<div class="container">

<h1>🌙 Lxvxnd3r</h1>

<h2>
"Somewhere between rain and dreams."
</h2>

<p>
✨ Aesthetic • Anime • Night lover ✨
</p>

<p>
Website cá nhân đầu tiên của mình.
</p>

</div>

<!-- WELCOME -->

<div id="welcome">

<h1>🌙</h1>

<p>Click anywhere to enter</p>

</div>

<!-- NHẠC -->

<audio
id="music"
loop
preload="auto">

<source
src="spider%20thread%20monopoly.mp3"
type="audio/mpeg">

</audio>

<script>

const welcome = document.getElementById("welcome");
const music = document.getElementById("music");

welcome.addEventListener("click", async ()=>{
    try{
        music.volume = 0.5;
        await music.play();
    }
    catch(e){
        console.log(e);
    }

    welcome.style.opacity="0";

    setTimeout(()=>{
        welcome.style.display="none";
    },1000);
});

</script>

</body>
</html>
