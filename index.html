<!DOCTYPE html>
<html>

<head>
    <title>Lan Anh</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Video nền */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Khung giới thiệu */
        .container {
            width: 600px;
            margin: auto;
            margin-top: 220px;

            text-align: center;

            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);

            padding: 40px;
            border-radius: 25px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 35px;
        }

        p {
            font-size: 20px;
        }
    </style>

</head>

<body>

    <!-- Video nền -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="night.mp4" type="video/mp4">
    </video>

    <!-- Nội dung -->
    <div class="container">
        <h1>Xin chào!</h1>

        <h2>Mình là Lan Anh 🌧️</h2>

        <p>Website cá nhân đầu tiên của mình.</p>

        <p>✨ Aesthetic • Anime • Night lover ✨</p>
    </div>

</body>

</html>
