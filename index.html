<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:Arial,sans-serif;
    color:white;

    background:black;
}

/* VIDEO */

#bg-video{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    /* Hiện phần trên của cây */
    object-position:center top;

    z-index:0;
}

/* LỚP TỐI */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.05);

    z-index:1;
}

/* ========================= */
/* KHUNG LIQUID GLASS */
/* ========================= */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:700px;
    max-width:90%;

    padding:55px;

    text-align:center;

    position:fixed;

    border:1.5px solid transparent;

    background:
        linear-gradient(
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03)
        ) padding-box,

        linear-gradient(
            135deg,
            rgba(255,190,230,0.75),
            rgba(190,240,255,0.75)
        ) border-box;

    border-radius:40px;

    backdrop-filter:
        blur(10px)
        saturate(180%)
        brightness(1.08);

    -webkit-backdrop-filter:
        blur(10px)
        saturate(180%)
        brightness(1.08);

    box-shadow:

        inset 0 1px 2px rgba(255,255,255,0.25),

        0 0 25px rgba(255,190,230,0.15),

        0 0 45px rgba(190,240,255,0.15),

        0 15px 45px rgba(0,0,0,0.25);

    overflow:visible;

    isolation:isolate;

    z-index:2;

    transition:0.5s;
}

/* phản chiếu */

.container::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:40px;

    background:

        linear-gradient(
            to bottom,
            rgba(255,255,255,0.22),
            transparent 35%
        ),

        radial-gradient(
            circle at top left,
            rgba(255,220,240,0.25),
            transparent 55%
        ),

        radial-gradient(
            circle at top right,
            rgba(210,245,255,0.25),
            transparent 55%
        );

    pointer-events:none;

    z-index:1;
}

/* vệt sáng */

.container::after{

    content:"";

    position:absolute;

    top:-50%;
    left:-60%;

    width:50%;
    height:250%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.15),
            transparent
        );

    transform:rotate(25deg);

    pointer-events:none;

    animation:shine 8s linear infinite;

    z-index:1;
}

@keyframes shine{

    0%{
        left:-60%;
    }

    100%{
        left:120%;
    }
}

/* hover */

.container:hover{

    transform:
        translate(-50%,-52%);

    box-shadow:

        0 0 35px rgba(255,190,230,0.25),

        0 0 60px rgba(190,240,255,0.25),

        0 20px 55px rgba(0,0,0,0.28);
}

/* ========================= */
/* CHỮ */
/* ========================= */

.container h1,
.container h2,
.container p{

    position:relative;

    z-index:5;
}

.container h1{

    font-size:72px;

    margin-bottom:20px;

    text-shadow:
        0 0 20px rgba(255,255,255,0.35);
}

.container h2{

    font-size:28px;

    font-weight:normal;

    margin-bottom:25px;
}

.container p{

    font-size:20px;

    margin-top:12px;
}

/* ========================= */
/* BONG BÓNG */
/* ========================= */

.bubble{

    position:absolute;

    border-radius:50%;

    background:
        radial-gradient(
            circle at 30% 30%,
            rgba(255,255,255,0.45),
            rgba(255,255,255,0.08) 45%,
            rgba(255,255,255,0.01)
        );

    border:
        1px solid rgba(255,255,255,0.18);

    backdrop-filter:
        blur(12px)
        saturate(180%);

    box-shadow:

        inset
        0 3px 8px rgba(255,255,255,0.30),

        inset
        0 -5px 12px rgba(255,255,255,0.05),

        0 0 20px rgba(255,255,255,0.08);

    pointer-events:none;

    z-index:1;
}

/* vị trí */

.b1{
    width:55px;
    height:55px;
    top:-20px;
    left:-15px;
    animation:float1 9s ease-in-out infinite;
}

.b2{
    width:40px;
    height:40px;
    top:70px;
    right:-15px;
    animation:float2 7s ease-in-out infinite;
}

.b3{
    width:70px;
    height:70px;
    bottom:-30px;
    left:120px;
    animation:float1 11s ease-in-out infinite;
}

.b4{
    width:35px;
    height:35px;
    right:170px;
    bottom:-10px;
    animation:float2 8s ease-in-out infinite;
}

.b5{
    width:28px;
    height:28px;
    top:25px;
    left:260px;
    animation:float1 6s ease-in-out infinite;
}

.b6{
    width:32px;
    height:32px;
    top:-15px;
    right:220px;
    animation:float2 9s ease-in-out infinite;
}

.b7{
    width:22px;
    height:22px;
    left:70px;
    bottom:40px;
    animation:float1 7s ease-in-out infinite;
}

.b8{
    width:45px;
    height:45px;
    right:80px;
    top:180px;
    animation:float2 10s ease-in-out infinite;
}

.b9{
    width:18px;
    height:18px;
    left:330px;
    top:-10px;
    animation:float1 5s ease-in-out infinite;
}

.b10{
    width:35px;
    height:35px;
    right:40px;
    bottom:-10px;
    animation:float2 8s ease-in-out infinite;
}

/* animation */

@keyframes float1{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-14px);
    }
}

@keyframes float2{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(14px);
    }
}
/* WELCOME */

#welcome{

    position:fixed;

    inset:0;

    background:black;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    cursor:pointer;

    z-index:9999;

    transition:1s;
}

#welcome h1{

    font-size:85px;

    margin-bottom:20px;
}

#welcome p{

    font-size:22px;

    opacity:0.8;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

    <source
        src="tree1.mp4"
        type="video/mp4">

</video>

<div class="overlay"></div>

<!-- KHUNG THÔNG TIN -->

<div class="container">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
    <div class="bubble b6"></div>
    <div class="bubble b7"></div>
    <div class="bubble b8"></div>
    <div class="bubble b9"></div>
    <div class="bubble b10"></div>

    <h1>🌙 Lan Anh</h1>

    <h2>
        "Somewhere between rain and dreams."
    </h2>

    <p>
        ✨ Aesthetic • Anime • Night lover ✨
    </p>

    <p>
        Website cá nhân đầu tiên của mình.
    </p>

</div>

<!-- WELCOME -->

<div id="welcome">

    <h1>🌙</h1>

    <p>Click anywhere to enter</p>

</div>

<!-- NHẠC -->

<audio
id="music"
loop
preload="auto">

    <source
        src="spider%20thread%20monopoly.mp3"
        type="audio/mpeg">

</audio>

<script>

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

welcome.addEventListener("click", async ()=>{

    try{

        music.volume = 0.5;

        await music.play();

    }
    catch(e){

        console.log(e);

    }

    welcome.style.opacity = "0";

    setTimeout(()=>{

        welcome.style.display = "none";

    },1000);

});

</script>

</body>
</html>
