<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lan Anh</title>

    <!-- CSS CHÍNH -->

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="css/moon.css">
    <link rel="stylesheet" href="css/stars.css">
    <link rel="stylesheet" href="css/planet.css">
    <link rel="stylesheet" href="css/animation.css">

    <!-- ORBIT -->

    <link rel="stylesheet" href="css/orbit/orbit-container.css">
    <link rel="stylesheet" href="css/orbit/orbit-ring.css">
    <link rel="stylesheet" href="css/orbit/orbit-gradient.css">
    <link rel="stylesheet" href="css/orbit/orbit-sparkle1.css">
    <link rel="stylesheet" href="css/orbit/orbit-sparkle2.css">
    <link rel="stylesheet" href="css/orbit/orbit-rotate.css">

</head>

<body>

    <!-- VIDEO NỀN -->

    <video id="bg-video"
           autoplay
           muted
           loop
           playsinline>

        <source src="tree1.mp4"
                type="video/mp4">

    </video>


    <!-- OVERLAY -->

    <div class="overlay"></div>


    <!-- KHUNG CHÍNH -->

    <div class="container">


        <!-- LAYER DÀNH RIÊNG CHO HIỆU ỨNG THỦY TINH -->

        <div class="glass-layer"></div>


        <!-- MOON SYSTEM -->

        <div class="moon-system">


            <!-- MẶT TRĂNG -->

            <div id="moon">🌙</div>


            <!-- SAO -->

            <div class="star s1"></div>
            <div class="star s2"></div>
            <div class="star s3"></div>
            <div class="star s4"></div>
            <div class="star s5"></div>
            <div class="star s6"></div>
            <div class="star s7"></div>
            <div class="star s8"></div>
            <div class="star s9"></div>
            <div class="star s10"></div>
            <div class="star s11"></div>
            <div class="star s12"></div>
            <div class="star s13"></div>


            <!-- ORBIT -->

            <div class="orbit-container">

                <div class="orbit-ring">

                    <div class="orbit-gradient"></div>

                    <div class="orbit-sparkle1"></div>

                    <div class="orbit-sparkle2"></div>

                </div>

            </div>

        </div>


        <!-- PLANET LAYER -->

        <div class="planet-layer">

            <div class="orbit-rotate">

                <div class="planet p1"></div>

                <div class="planet p2"></div>

                <div class="planet p3"></div>

                <div class="planet p4"></div>

            </div>

        </div>


        <!-- TEXT -->

        <p class="search-text">

        </p>

    </div>


    <!-- WELCOME -->

    <div id="welcome">

        <h1>🌙</h1>

        <p>Tap to enter the moonlight ✦</p>

    </div>


    <!-- MUSIC -->

    <audio id="music"
           loop
           preload="auto">

        <source src="spider thread monopoly.mp3"
                type="audio/mpeg">

    </audio>


    <!-- JAVASCRIPT -->

    <script src="js/script.js"></script>

</body>

</html>
