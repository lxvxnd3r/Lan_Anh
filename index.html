<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
}

/* VIDEO NỀN */

#bg-video{
    position:fixed;

    top:-140px;
    left:0;

    width:100%;
    height:calc(100% + 140px);

    object-fit:cover;

    z-index:0;
}

/* LỚP TỐI */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.35);

    z-index:1;
}

/* KHUNG GIỚI THIỆU */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:700px;
    max-width:90%;

    padding:50px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:30px;

    box-shadow:
        0 0 40px rgba(0,0,0,0.4);

    z-index:2;
}

.container h1{
    font-size:60px;
    margin-bottom:20px;
}

.container h2{
    font-size:28px;
    font-weight:normal;
    margin-bottom:25px;
}

.container p{
    font-size:20px;
    margin-top:12px;
}

/* WELCOME SCREEN */

#welcome{

    position:fixed;
    inset:0;

    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:9999;

    cursor:pointer;

    transition:1s;
}

#welcome h1{
    font-size:70px;
    margin-bottom:20px;
}

#welcome p{
    font-size:22px;
    opacity:0.75;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
    id="bg-video"
    autoplay
    muted
    loop
    playsinline>

    <source
        src="tree1.mp4"
        type="video/mp4">

</video>

<div class="overlay"></div>

<!-- THÔNG TIN -->

<div class="container">

    <h1>🌙 Lan Anh</h1>

    <h2>
        "Somewhere between rain and dreams."
    </h2>

    <p>
        ✨ Aesthetic • Anime • Night Lover ✨
    </p>

    <p>
        Website cá nhân đầu tiên của mình.
    </p>

</div>

<!-- WELCOME -->

<div id="welcome">

    <h1>🌙</h1>

    <p>Click anywhere to enter</p>

</div>

<!-- NHẠC -->

<audio id="music" loop>

    <source
        src="spider thread monopoly.mp3"
        type="audio/mpeg">

</audio>

<script>

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

welcome.addEventListener("click", () => {

    music.play();

    welcome.style.opacity = "0";

    setTimeout(() => {

        welcome.style.display = "none";

    },1000);

});

</script>

</body>
</html>
