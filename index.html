<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Lan Anh 🌙</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- VIDEO NỀN -->

    <video
        id="bg-video"
        autoplay
        muted
        loop
        playsinline>

        <source
            src="tree1.mp4"
            type="video/mp4">

    </video>

    <!-- LỚP TỐI -->

    <div class="overlay"></div>


    <!-- KHUNG CHÍNH -->

    <div class="container">

        <div class="moon-system">

            <!-- QUỸ ĐẠO -->

            <div class="orbit-container">

                <div class="orbit-ring"></div>

                <div class="planet p1"></div>
                <div class="planet p2"></div>
                <div class="planet p3"></div>
                <div class="planet p4"></div>

            </div>

            <!-- MẶT TRĂNG -->

            <div id="moon">🌙</div>

            <!-- SAO -->

            <div class="star s1"></div>
            <div class="star s2"></div>
            <div class="star s3"></div>
            <div class="star s4"></div>
            <div class="star s5"></div>
            <div class="star s6"></div>
            <div class="star s7"></div>
            <div class="star s8"></div>

            <!-- CHỮ -->

            <p class="search-text">

                Đang tìm kiếm thứ gì à?

            </p>

        </div>

    </div>


    <!-- WELCOME -->

    <div id="welcome">

        <h1>🌙</h1>

        <p>Tap to enter the moonlight ✦</p>

    </div>


    <!-- NHẠC -->

    <audio
        id="music"
        loop
        preload="auto">

        <source
            src="spider thread monopoly.mp3"
            type="audio/mpeg">

    </audio>


    <!-- JAVASCRIPT -->

    <script src="js/script.js"></script>

</body>

</html>
