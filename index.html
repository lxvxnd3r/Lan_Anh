<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Lan Anh 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:Arial,sans-serif;

    background:black;

    color:white;
}

/* VIDEO */

#bg-video{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    object-position:center top;

    z-index:0;
}

/* LỚP TỐI */

.overlay{

    position:fixed;

    inset:0;

    background:
        rgba(0,0,0,.08);

    z-index:1;
}

/* ======================= */
/* CONTAINER */
/* ======================= */

.container{

    position:fixed;

    top:50%;
    left:50%;

    transform:
        translate(-50%,-50%);

    width:800px;
    height:550px;

    max-width:95%;

    display:flex;

    justify-content:center;
    align-items:center;

    overflow:visible;

    z-index:2;
}

/* ======================= */
/* MOON SYSTEM */
/* ======================= */

.moon-system{

    position:relative;

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* ======================= */
/* MOON */
/* ======================= */

#moon{

    font-size:170px;

    cursor:pointer;

    user-select:none;

    position:relative;

    z-index:20;

    animation:
        moonFloat 5s
        ease-in-out infinite;

    transition:1s;

    filter:

        drop-shadow(
            0 0 35px
            rgba(255,225,130,.8)
        )

        drop-shadow(
            0 0 90px
            rgba(255,230,170,.45)
        );
}

#moon:hover{

    scale:1.08;

    filter:

        drop-shadow(
            0 0 50px
            rgba(255,240,180,1)
        )

        drop-shadow(
            0 0 130px
            rgba(255,240,180,.6)
        );
}

/* ======================= */
/* TEXT */
/* ======================= */

.search-text{

    margin-top:20px;

    font-size:34px;

    text-shadow:

        0 0 12px white,

        0 0 30px #8be8ff,

        0 0 60px #8be8ff;

    animation:
        glowText
        3s ease-in-out infinite;
}

/* ======================= */
/* STARS */
/* ======================= */

.star{

    position:absolute;

    width:12px;
    height:12px;

    background:white;

    border-radius:2px;

    transform:
        rotate(45deg);

    box-shadow:

        0 0 10px white,

        0 0 25px #8be8ff,

        0 0 45px #8be8ff;

    animation:
        twinkle 3s infinite;
}

.s1{top:15%;left:15%;}
.s2{top:18%;right:18%;}
.s3{top:65%;left:20%;}
.s4{bottom:20%;right:20%;}
.s5{bottom:30%;left:30%;}
.s6{top:35%;right:10%;}
.s7{top:28%;left:8%;}
.s8{bottom:35%;right:35%;}

/* ======================= */
/* ORBIT */
/* ======================= */

.orbit-container{

    position:absolute;

    width:650px;
    height:650px;

    opacity:0;

    scale:0;

    transition:

        opacity 1.5s,
        scale 1.5s;

    pointer-events:none;
}

.orbit-container.active{

    opacity:1;

    scale:1;

    pointer-events:auto;

    animation:

        rotateOrbit
        35s linear infinite;
}

.orbit-container:hover{

    animation-play-state:
        paused;
}

/* ======================= */
/* PLANETS */
/* ======================= */

.planet{

    position:absolute;

    width:90px;
    height:90px;

    border-radius:50%;

    background:

        rgba(255,255,255,.08);

    backdrop-filter:

        blur(15px);

    border:

        1px solid
        rgba(255,255,255,.20);

    box-shadow:

        inset
        0 2px 12px
        rgba(255,255,255,.35),

        0 0 30px
        rgba(255,255,255,.18);
}

.p1{

    top:-45px;
    left:280px;
}

.p2{

    top:280px;
    right:-45px;
}

.p3{

    bottom:-45px;
    left:280px;
}

.p4{

    top:280px;
    left:-45px;
}

/* ======================= */
/* WELCOME */
/* ======================= */

#welcome{

    position:fixed;

    inset:0;

    background:black;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    cursor:pointer;

    z-index:9999;

    transition:1s;
}

#welcome h1{

    font-size:90px;

    margin-bottom:20px;
}

#welcome p{

    font-size:24px;

    opacity:.8;
}

/* ======================= */
/* ANIMATION */
/* ======================= */

@keyframes moonFloat{

    0%,100%{

        transform:
            translateY(0px);
    }

    50%{

        transform:
            translateY(-18px);
    }
}

@keyframes glowText{

    0%,100%{

        opacity:.7;
    }

    50%{

        opacity:1;
    }
}

@keyframes twinkle{

    0%,100%{

        opacity:.3;

        transform:

            scale(.7)
            rotate(45deg);
    }

    50%{

        opacity:1;

        transform:

            scale(1.4)
            rotate(45deg);
    }
}

@keyframes rotateOrbit{

    from{

        transform:
            rotate(0deg);
    }

    to{

        transform:
            rotate(360deg);
    }
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

    <source
        src="tree1.mp4"
        type="video/mp4">

</video>

<div class="overlay"></div>


<div class="container">

    <div class="star s1"></div>
    <div class="star s2"></div>
    <div class="star s3"></div>
    <div class="star s4"></div>
    <div class="star s5"></div>
    <div class="star s6"></div>
    <div class="star s7"></div>
    <div class="star s8"></div>

    <div class="moon-system">

        <div id="moon">
            🌙
        </div>

        <p class="search-text">
            Đang tìm kiếm thứ gì à?
        </p>

        <div class="orbit-container">

            <div class="planet p1"></div>
            <div class="planet p2"></div>
            <div class="planet p3"></div>
            <div class="planet p4"></div>

        </div>

    </div>

</div>


<!-- WELCOME -->

<div id="welcome">

    <h1>🌙</h1>

    <p>Click anywhere to enter</p>

</div>


<!-- MUSIC -->

<audio
id="music"
loop
preload="auto">

    <source
        src="spider thread monopoly.mp3"
        type="audio/mpeg">

</audio>


<script>

const welcome =
document.getElementById("welcome");

const music =
document.getElementById("music");

const moon =
document.getElementById("moon");

const orbit =
document.querySelector(".orbit-container");


welcome.addEventListener(
"click",
async ()=>{

    try{

        music.volume = 0.5;

        await music.play();

    }catch(e){

        console.log(e);
    }

    welcome.style.opacity="0";

    setTimeout(()=>{

        welcome.style.display="none";

    },1000);

});


moon.addEventListener(
"click",
()=>{

    orbit.classList.toggle(
        "active"
    );

});

</script>

</body>
</html>
