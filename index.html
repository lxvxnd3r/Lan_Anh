<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan Anh 🌙</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Màn hình mở đầu */
        #enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            z-index: 9999;
            cursor: pointer;
            transition: 1s;
        }

        #enter-screen h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        #enter-screen p {
            font-size: 22px;
            opacity: 0.8;
        }

        /* Video nền */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Lớp tối */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* Khung nội dung */
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 650px;
            max-width: 90%;

            padding: 45px;
            text-align: center;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);

            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 {
            font-size: 55px;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        p {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Màn hình mở đầu -->
    <div id="enter-screen">
        <h1>🌙 Welcome</h1>
        <p>Click anywhere to enter</p>
    </div>

    <!-- Nhạc -->
    <audio id="bg-music" loop>
        <source src="spider%20thread%20monopoly.mp3" type="audio/mpeg">
    </audio>

    <!-- Video nền -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="tree1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <h1>🌙 Lan Anh</h1>

        <h2>"Somewhere between rain and dreams."</h2>

        <p>✨ Aesthetic • Anime • Night lover ✨</p>

        <p>Website cá nhân đầu tiên của mình.</p>
    </div>

    <script>
        const enter = document.getElementById("enter-screen");
        const music = document.getElementById("bg-music");

        enter.addEventListener("click", () => {
            music.play();

            enter.style.opacity = "0";

            setTimeout(() => {
                enter.style.display = "none";
            }, 1000);
        });
    </script>

</body>

</html>
